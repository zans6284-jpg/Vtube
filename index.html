<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtuber CL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.133.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1.5/dist/kalidokit.it.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(-45deg, #ff0055, #7000ff, #00d4ff);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Title Style */
        .header-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 20px 50px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            /* Style Tebal Gemuk Transparan Gabungan Warna */
            background: linear-gradient(to right, #ff0055, #7000ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
        }

        /* Kontainer Utama */
        .main-stage {
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        /* Layar Kamera Mengambang */
        .camera-box {
            width: 200px;
            height: 300px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.5);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #input_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Layar Karakter */
        .avatar-box {
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Controls */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.95); }

        .btn-start { background-color: #007bff; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
        .btn-stop { background-color: #7000ff; box-shadow: 0 4px 15px rgba(112,0,255,0.4); }
        .btn-restart { background-color: #ff0055; box-shadow: 0 4px 15px rgba(255,0,85,0.4); }

    </style>
</head>
<body>

    <div class="header-container">
        <h1>Vtuber CL</h1>
    </div>

    <div class="main-stage">
        <div class="camera-box">
            <video id="input_video"></video>
        </div>

        <div class="avatar-box" id="avatar_container">
            <p style="color: white; position: absolute;">Loading Model...</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" onclick="startCamera()">Start</button>
        <button class="btn-stop" onclick="stopCamera()">Stop</button>
        <button class="btn-restart" onclick="restartSystem()">Restart</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        let camera = null;

        // Inisialisasi Holistic untuk deteksi wajah & tubuh
        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        holistic.onResults(onResults);

        function onResults(results) {
            // Di sini logika untuk menggerakkan model 3D menggunakan data 'results'
            // Menggunakan Kalidokit untuk smooth tracking
            animateLive2D(results);
        }

        function startCamera() {
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
            console.log("Kamera Berjalan...");
        }

        function stopCamera() {
            if (camera) {
                camera.stop();
                const stream = videoElement.srcObject;
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
                videoElement.srcObject = null;
                console.log("Kamera Berhenti.");
            }
        }

        function restartSystem() {
            location.reload();
        }

        function animateLive2D(results) {
            // Logika integrasi rigging model (VRM/Live2D) 
            // Untuk demo ini, kita memastikan data masuk tanpa lag
            if(results.faceLandmarks) {
                // Tracking manik mata dan wajah aktif
            }
        }

        // Catatan: Untuk menampilkan model 3D (VRM), 
        // Anda perlu memuat file .vrm menggunakan GLTFLoader
    </script>
</body>
      </html>
