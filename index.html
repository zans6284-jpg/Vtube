<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vtuber CL</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>
    
    <style>
        :root {
            --gradien-utama: linear-gradient(45deg, #ff0000, #800080, #0000ff);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Arial', sans-serif;
            background: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; /* Agar bisa scroll karena layar model besar */
        }

        /* Background Bergerak */
        .animated-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(-45deg, #ff0000, #4b0082, #0000ff, #8a2be2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .title-web {
            font-size: 2.5rem;
            font-weight: 900;
            background: var(--gradien-utama);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* Layout Layar */
        .display-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            padding-bottom: 120px; /* Ruang untuk tombol bawah */
        }

        /* Layar Kamera Wajah (500x600) */
        .camera-layer {
            width: 500px;
            height: 600px;
            border: 4px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        /* Layar Model (800x800) */
        .character-layer {
            width: 800px;
            height: 800px;
            border: 4px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            position: relative;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Panel Kontrol Bawah */
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-start { background: #0000ff; }
        .btn-stop { background: #800080; }
        .btn-restart { background: #ff0000; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        /* Menu Samping */
        .side-menu {
            position: fixed;
            right: 20px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>

<div class="header-box">
    <h1 class="title-web">VTUBER CL</h1>
</div>

<div class="display-container">
    <div class="camera-layer">
        <video id="input_video" style="display:none" playsinline></video>
        <canvas id="output_canvas_camera"></canvas>
    </div>

    <div class="character-layer" id="vtuber_renderer">
        </div>
</div>

<div class="controls">
    <button class="btn btn-start" onclick="startApp()">START</button>
    <button class="btn btn-stop" onclick="stopApp()">STOP</button>
    <button class="btn btn-restart" onclick="location.reload()">RESTART</button>
</div>

<div class="side-menu">
    <button class="btn btn-start" style="font-size: 10px;" onclick="alert('Pilih file model (.vrm)')">UPLOAD MODEL</button>
    <button class="btn btn-stop" style="font-size: 10px;">PAKAI MODEL</button>
</div>

<script>
    let cameraInstance = null;
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas_camera');
    const canvasCtx = canvasElement.getContext('2d');

    async function startApp() {
        try {
            // Minta izin kamera secara eksplisit
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;

            const holistic = new Holistic({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
            });

            holistic.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            holistic.onResults((results) => {
                canvasCtx.save();
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                // Gambar video asli ke canvas
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                
                // Efek visual deteksi (optional)
                if (results.faceLandmarks) {
                    // Di sini logika untuk menggerakkan model 3D nantinya
                }
                canvasCtx.restore();
            });

            cameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await holistic.send({image: videoElement});
                },
                width: 500,
                height: 600
            });
            
            cameraInstance.start();
            console.log("Kamera Berhasil Dijalankan");
        } catch (err) {
            console.error("Gagal Akses Kamera: ", err);
            alert("Kamera tidak ditemukan atau izin ditolak!");
        }
    }

    function stopApp() {
        if (cameraInstance) {
            cameraInstance.stop();
            const tracks = videoElement.srcObject.getTracks();
            tracks.forEach(track => track.stop());
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            alert("Kamera Dimatikan");
        }
    }
</script>

</body>
</html>
