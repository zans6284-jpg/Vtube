<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vtuber CL</title>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.0.0/lib/three-vrm.min.js"></script>

<!-- Tensorflow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg, red, purple, blue);
background-size:300% 300%;
animation:move 6s infinite alternate;
z-index:-1;
}
@keyframes move{
0%{background-position:left;}
100%{background-position:right;}
}

/* TITLE */
.title{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.6);
padding:10px 25px;
border-radius:15px;
font-size:30px;
font-weight:bold;
}

/* BUTTON */
.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}
button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
.start{background:blue;color:white;}
.stop{background:purple;color:white;}
.restart{background:red;color:white;}

/* CAMERA */
#video{
position:absolute;
left:20px;
top:80px;
width:300px;
height:400px;
border-radius:20px;
}

/* VTUBER */
#vtuberCanvas{
position:absolute;
right:20px;
top:80px;
width:500px;
height:500px;
}

/* MENU */
.menu{
position:absolute;
top:80px;
left:350px;
background:rgba(255,255,255,0.6);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="title">Vtuber CL</div>

<video id="video" autoplay playsinline></video>
<canvas id="vtuberCanvas"></canvas>

<div class="controls">
<button class="start" onclick="startApp()">Start</button>
<button class="stop" onclick="stopApp()">Stop</button>
<button class="restart" onclick="restartApp()">Restart</button>
</div>

<div class="menu">
<input type="file" id="upload" accept=".vrm">
<button onclick="useModel()">Use Model</button>
</div>

<script>
let video = document.getElementById("video");
let stream = null;
let detector = null;
let model = null;

/* THREE SETUP */
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(30, 1, 0.1, 1000);
camera.position.set(0, 1, 3);

let renderer = new THREE.WebGLRenderer({
canvas: document.getElementById("vtuberCanvas"),
alpha:true,
antialias:true
});
renderer.setSize(500,500);
renderer.setClearColor(0x000000,0);

/* LIGHTING (WAJIB) */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1,1,1);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

/* AI LOAD */
async function loadAI(){
detector = await faceLandmarksDetection.createDetector(
faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
{ runtime: "tfjs" }
);
}

/* START */
async function startApp(){
stream = await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject = stream;

await loadAI();
animate();
}

/* STOP */
function stopApp(){
if(stream){
stream.getTracks().forEach(t=>t.stop());
}
}

/* RESTART */
function restartApp(){
stopApp();
startApp();
}

/* LOAD VRM */
async function useModel(){
let file = document.getElementById("upload").files[0];
if(!file) return alert("Upload file .vrm");

let url = URL.createObjectURL(file);

const loader = new THREE.GLTFLoader();
loader.load(url,(gltf)=>{

THREE.VRMUtils.removeUnnecessaryVertices(gltf.scene);

THREE.VRM.from(gltf).then((vrm)=>{

if(model) scene.remove(model.scene);

model = vrm;

/* FIX POSISI */
model.scene.scale.set(1,1,1);
model.scene.position.set(0,-1,0);

scene.add(model.scene);

});
});
}

/* ANIMATION */
async function animate(){
requestAnimationFrame(animate);

if(detector && video.readyState === 4){
const faces = await detector.estimateFaces(video);

if(faces.length>0 && model){
let face = faces[0];

let x = face.keypoints[1].x / video.videoWidth - 0.5;
let y = face.keypoints[1].y / video.videoHeight - 0.5;

/* GERAK VTUBER */
model.scene.rotation.y = x * 2;
model.scene.rotation.x = y * 2;
}
}

renderer.render(scene,camera);
}
</script>

</body>
</html>
